name: Telegram Commands

on:
  # Check for /update commands every 5 minutes
  schedule:
    - cron: "*/5 * * * *"

  # Also allow manual trigger
  workflow_dispatch:

jobs:
  commands:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Handle Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --commands

      - name: Save updated state back to repository
        run: |
          git config user.name  "Water Level Bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
